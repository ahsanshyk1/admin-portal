<div class="add-sale-wrapper">
  <div class="page-header">
    <div class="header-content">
      <h1>Create New Sale</h1>
      <p>Fill in the details below to generate a new transaction and invoice.</p>
    </div>
  </div>

  <form nz-form [formGroup]="salesForm" class="add-sale-form">
    <div class="premium-card form-section">
      <div class="section-header">
        <h2>General Information</h2>
      </div>
      <div class="form-grid">
        <div class="form-item">
          <label>Invoice ID</label>
          <input nz-input formControlName="invoiceId" placeholder="e.g. INV-2026-001" />
        </div>

        <div class="form-item">
          <label>Customer Name</label>
          <input nz-input formControlName="customer" placeholder="e.g. John Doe / ABC Corp" />
        </div>

        <div class="form-item">
          <label>Payment Status</label>
          <nz-select formControlName="status">
            <nz-option nzValue="Paid" nzLabel="Paid"></nz-option>
            <nz-option nzValue="Unpaid" nzLabel="Unpaid"></nz-option>
          </nz-select>
        </div>
      </div>
    </div>

    <div class="premium-card form-section items-card">
      <div class="section-header">
        <h2>Order Items</h2>
        <button nz-button nzType="default" nzSize="small" (click)="addItem()">
          <span nz-icon nzType="plus"></span> Add Item
        </button>
      </div>
      
      <div formArrayName="items" class="items-list">
        <div class="items-header">
          <div class="col-product">Product</div>
          <div class="col-qty">Qty</div>
          <div class="col-price">Unit Price</div>
          <div class="col-subtotal">Subtotal</div>
          <div class="col-action"></div>
        </div>

        <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
          <div class="col-product">
            <input nz-input formControlName="name" placeholder="Item name" />
          </div>
          <div class="col-qty">
            <input nz-input type="number" formControlName="quantity" (input)="updateSubtotal(i)" />
          </div>
          <div class="col-price">
            <input nz-input type="number" formControlName="unitPrice" (input)="updateSubtotal(i)" />
          </div>
          <div class="col-subtotal">
            <input nz-input [value]="item.get('subtotal')?.value | currency" disabled />
          </div>
          <div class="col-action">
            <button nz-button nzType="text" nzDanger (click)="removeItem(i)" nz-tooltip nzTooltipTitle="Remove Item">
              <span nz-icon nzType="delete"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="form-footer">
      <div class="total-display">
        <span class="label">Total Amount:</span>
        <span class="amount">{{ salesForm.get('totalAmount')?.value | currency }}</span>
      </div>
      <div class="actions">
        <button nz-button nzType="primary" (click)="handleOk()" [disabled]="salesForm.invalid">
          <span nz-icon nzType="save"></span> Save & Generate Invoice
        </button>
      </div>
    </div>
  </form>
</div>
