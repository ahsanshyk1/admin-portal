<div class="app-layout">
  @if(isAuthenticated()){
  <div class="sidebar-backdrop" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-wrapper">
      <div class="logo">
        <a routerLink="/" style="display: flex; align-items: center; gap: 12px; text-decoration: none;" (click)="closeSidebar()">
          <img src="assets/svg/logo.svg" alt="Battery Portal Logo" style="height: 36px; width: auto;" />
          <span style="font-weight: 700; font-size: 18px; color: #1e293b; letter-spacing: -0.5px;">Battery Portal</span>
        </a>
      </div>

      <nav class="sidebar-menu">
        <ul nz-menu nzMode="inline">
          <li nz-menu-item *ngFor="let item of menuItems" [routerLink]="item.link" routerLinkActive="selected" (click)="closeSidebar()">
            <nz-icon [nzType]="item.icon" nzTheme="outline"></nz-icon>
            {{ item.label }}
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer-container">
        <div class="sidebar-footer" nz-dropdown [nzDropdownMenu]="profileMenu" nzPlacement="topRight" nzTrigger="click">
          <div class="user-profile">
            <nz-avatar nzText="A" class="profile-avatar"></nz-avatar>
            <div class="user-info">
              <span class="user-name">Ahsan</span>
              <span class="user-role">ahsan@example.com</span>
            </div>
            <div class="profile-action">
              <span nz-icon nzType="more" nzTheme="outline"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <nz-dropdown-menu #profileMenu="nzDropdownMenu">
    <ul nz-menu class="profile-dropdown-menu">
      <li nz-menu-item class="menu-header">
        <strong>Account Settings</strong>
      </li>
      <li nz-menu-divider></li>
      <li nz-menu-item>
        <span nz-icon nzType="lock" nzTheme="outline"></span>
        Change Password
      </li>
      <li nz-menu-item (click)="onLogout()" nzDanger>
        <span nz-icon nzType="logout" nzTheme="outline"></span>
        Sign Out
      </li>
    </ul>
  </nz-dropdown-menu>
  }
  
  <!-- Content -->
  <main class="inner-content" [class.auth-bg]="isAuthenticated()">
    @if(isAuthenticated()){
      <div class="mobile-header">
        <div class="mobile-logo">
          <img src="assets/svg/logo.svg" alt="Logo" />
          <span>Battery Portal</span>
        </div>
        <button nz-button nzType="text" class="menu-toggle" (click)="toggleSidebar()">
          <span nz-icon nzType="menu" nzTheme="outline"></span>
        </button>
      </div>
    }
    <div [class.main-content-area]="isAuthenticated()">
      <ng-content></ng-content>
    </div>
  </main>
</div>
