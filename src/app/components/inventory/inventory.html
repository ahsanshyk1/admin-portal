<div class="inventory-wrapper">
  <div class="page-header">
    <div class="header-content">
      <h1>Inventory Management</h1>
      <p>Monitor and manage your stock levels across all categories.</p>
    </div>
    <div class="header-actions">
      <div class="search-wrapper">
        <span nz-icon nzType="search"></span>
        <input nz-input placeholder="Search SKU, name or category..." class="search-input" />
      </div>
      <button nz-button nzType="primary" (click)="openModal()" class="add-btn">
        <span nz-icon nzType="plus"></span> Add Item
      </button>
    </div>
  </div>

  <div class="premium-card table-section">
    <nz-table #inventoryTable [nzData]="inventoryList" [nzFrontPagination]="true" [nzPageSizeOptions]="[5,10,15,20]" [nzPageSize]="10" [nzLoading]="!inventoryList.length" nzSize="middle">
      <thead>
        <tr>
          <th>Product Name</th>
          <th>SKU Number</th>
          <th>Category</th>
          <th>Stock Quantity</th>
          <th>Status</th>
          <th width="120px">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of inventoryList">
          <td class="name-cell"><strong>{{ item.name }}</strong></td>
          <td><code class="sku-tag">{{ item.sku }}</code></td>
          <td>{{ item.category }}</td>
          <td>
            <span class="qty-badge" [class.low]="item.quantity < 10">{{ item.quantity }}</span>
          </td>
          <td>
            <nz-tag [nzColor]="getStatusColor(item.status)" class="status-tag">{{ item.status }}</nz-tag>
          </td>
          <td class="actions-cell">
            <button nz-button nzType="text" (click)="editItem(item)" nz-tooltip nzTooltipTitle="Edit">
              <span nz-icon nzType="edit"></span>
            </button>
            <button nz-button nzType="text" nzDanger (click)="deleteProduct(item._id)" nz-tooltip nzTooltipTitle="Delete">
              <span nz-icon nzType="delete"></span>
            </button>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>


  <!-- Add/Edit Item Modal -->
  <nz-modal [(nzVisible)]="isModalVisible" [nzTitle]="modalTitleTemplate" (nzOnCancel)="closeModal()" (nzOnOk)="submitForm()" [nzOkDisabled]="!inventoryForm.valid" nzWidth="600px">
    <ng-template #modalTitleTemplate>
      <div class="modal-title-custom">
        <span nz-icon [nzType]="editingItemIndex !== null ? 'edit' : 'plus-circle'"></span>
        <span>{{ modalTitle }}</span>
      </div>
    </ng-template>

    <ng-container *nzModalContent>
      <form [formGroup]="inventoryForm" nz-form class="premium-form">
        <div class="form-grid">
          <div class="form-item">
            <label>Product Name</label>
            <input nz-input formControlName="name" placeholder="e.g. Lead Acid Battery" />
          </div>

          <div class="form-item">
            <label>SKU Number</label>
            <input nz-input formControlName="sku" placeholder="e.g. BATT-001" />
          </div>

          <div class="form-item">
            <label>Category</label>
            <input nz-input formControlName="category" placeholder="e.g. Automotive" />
          </div>

          <div class="form-item">
            <label>Stock Quantity</label>
            <input nz-input type="number" formControlName="quantity" />
          </div>

          <div class="form-item full-width">
            <label>Current Status</label>
            <nz-select formControlName="status" class="premium-select">
              <nz-option nzValue="Active" nzLabel="Active"></nz-option>
              <nz-option nzValue="Low Stock" nzLabel="Low Stock"></nz-option>
              <nz-option nzValue="Out of Stock" nzLabel="Out of Stock"></nz-option>
            </nz-select>
          </div>
        </div>
      </form>
    </ng-container>
  </nz-modal>

</div>
