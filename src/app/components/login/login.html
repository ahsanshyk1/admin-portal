<div class="login-wrapper">
  <div class="login-aside">
    <div class="aside-content">
      <a routerLink="/"><img src="assets/svg/logo.svg" alt="Battery Portal Logo" class="aside-logo" style="height: 64px; width: auto; margin-bottom: 24px; display: block;" /></a>
      <h1>Battery Inventory <br/><span>Admin Portal</span></h1>
      <p>Efficiently manage your inventory and sales with our powerful administrative dashboard.</p>
    </div>
  </div>
  <div class="login-main">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome back</h2>
        <p>Please enter your details to sign in</p>
      </div>
      
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <div class="form-item">
          <label>Email Address</label>
          <input nz-input formControlName="email" placeholder="e.g. ahsan@example.com" />
        </div>

        <div class="form-item">
          <label>Password</label>
          <input nz-input type="password" formControlName="password" placeholder="••••••••" />
        </div>

        <div class="error-message" *ngIf="error">
          <span nz-icon nzType="close-circle"></span>
          {{ error }}
        </div>

        <button nz-button nzType="primary" nzBlock [nzLoading]="loading" class="login-btn">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="login-footer">
        <p>© 2026 AdminPortal. All rights reserved.</p>
      </div>
    </div>
  </div>
</div>
